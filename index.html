<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BlogSphere</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <h1 class="text-3xl font-extrabold text-indigo-600">
        BlogSphere
      </h1>

      <nav class="hidden md:flex gap-8">
        <a href="#" class="hover:text-indigo-600">Home</a>
        <a href="#" class="hover:text-indigo-600">Blogs</a>
        <a href="#" class="hover:text-indigo-600">About</a>
      </nav>

    </div>
  </header>

  <!-- Hero -->
  <section class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-24">

    <div class="max-w-7xl mx-auto px-6">

      <h2 class="text-5xl md:text-6xl font-extrabold leading-tight mb-6">
        Modern Blog Website
      </h2>

      <p class="text-lg text-indigo-100 max-w-2xl">
        Read the latest articles about technology,
        startups, design, development and innovation.
      </p>

    </div>

  </section>

  <!-- Blog Section -->
  <section class="max-w-7xl mx-auto px-6 py-16">

    <div class="flex items-center justify-between mb-10">

      <div>
        <h3 class="text-4xl font-bold mb-2">
          Latest Blogs
        </h3>

        <p class="text-gray-500">
          Latest blogs are automatically shown first.
        </p>
      </div>

      <button
        onclick="sortBlogs()"
        class="bg-indigo-600 text-white px-5 py-3 rounded-xl hover:bg-indigo-700 transition"
      >
        Sort Latest
      </button>

    </div>

    <!-- Blog Grid -->
    <div
      id="blogContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
    ></div>

  </section>

  <!-- Footer -->
  <footer class="bg-black text-gray-400 py-8 mt-16">

    <div class="max-w-7xl mx-auto px-6 text-center">
      © 2026 BlogSphere. All Rights Reserved.
    </div>

  </footer>

  <!-- BLOG DATA -->
  <script>

    /*
      ADD NEW BLOGS HERE
    */

    const blogs = [

      {
        id: 1,
        title: "The Future of AI in Web Development",
        category: "Technology",
        date: "2026-05-16",

        image:
          "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop",

        description:
          "Explore how AI is transforming modern web applications.",

        content:
          `
            <p class="mb-6">
              Artificial Intelligence is changing the way developers build modern applications.
            </p>

            <p class="mb-6">
              AI tools can generate code, automate testing and improve user experiences.
            </p>

            <h2 class="text-3xl font-bold mb-4">
              Why AI Matters
            </h2>

            <p class="mb-6">
              Businesses are rapidly integrating AI into products to increase efficiency and innovation.
            </p>
          `
      },

      {
        id: 2,
        title: "Minimal UI Design Trends in 2026",
        category: "Design",
        date: "2026-05-15",

        image:
          "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop",

        description:
          "Latest minimalist design principles for modern interfaces.",

        content:
          `
            <p class="mb-6">
              Minimalism continues to dominate modern UI design.
            </p>

            <p class="mb-6">
              Designers focus on clean layouts, spacing and typography.
            </p>
          `
      },

      {
        id: 3,
        title: "Why JavaScript Still Dominates",
        category: "Development",
        date: "2026-05-12",

        image:
          "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=1200&auto=format&fit=crop",

        description:
          "Understanding why JavaScript remains the top language.",

        content:
          `
            <p class="mb-6">
              JavaScript powers frontend and backend development.
            </p>

            <p class="mb-6">
              Its ecosystem is massive and continues to evolve rapidly.
            </p>
          `
      }

    ];

  </script>

  <!-- MAIN SCRIPT -->
  <script>

    const blogContainer = document.getElementById("blogContainer");

    function displayBlogs(blogList){

      blogContainer.innerHTML = "";

      blogList.forEach(blog => {

        const card = `

          <a
            href="blog.html?id=${blog.id}"
            class="block bg-white rounded-3xl overflow-hidden shadow-lg hover:-translate-y-2 hover:shadow-2xl transition duration-300"
          >

            <img
              src="${blog.image}"
              class="w-full h-56 object-cover"
              alt="${blog.title}"
            >

            <div class="p-6">

              <div class="flex items-center justify-between mb-4">

                <span class="bg-indigo-100 text-indigo-600 text-sm px-3 py-1 rounded-full">
                  ${blog.category}
                </span>

                <span class="text-gray-400 text-sm">
                  ${blog.date}
                </span>

              </div>

              <h3 class="text-2xl font-bold mb-3">
                ${blog.title}
              </h3>

              <p class="text-gray-600 mb-5">
                ${blog.description}
              </p>

              <div class="text-indigo-600 font-semibold">
                Read Full Blog →
              </div>

            </div>

          </a>

        `;

        blogContainer.innerHTML += card;
      });
    }

    function sortBlogs(){

      blogs.sort((a,b) =>
        new Date(b.date) - new Date(a.date)
      );

      displayBlogs(blogs);
    }

    sortBlogs();

  </script>

</body>
</html>
