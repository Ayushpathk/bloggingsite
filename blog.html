<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlogSphere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            paper: { 50: '#faf9f7', 100: '#f5f3ef', 200: '#eae6df', 300: '#d4cfc5' },
            ink: { DEFAULT: '#1a1a1a', light: '#2d2d2d', muted: '#6b6b6b', faint: '#a0a0a0' },
            accent: { tech: '#2563eb', design: '#d946ef', dev: '#059669', sec: '#dc2626' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-serif { font-family: 'Playfair Display', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    #read-progress { position: fixed; top: 0; left: 0; height: 2px; background: #1a1a1a; z-index: 100; width: 0%; transition: width 0.1s; }
    .dark #read-progress { background: #e5e5e5; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4cfc5; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #404040; }

    .prose h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.875rem; font-weight: 600; margin-top: 3rem; margin-bottom: 1.25rem; line-height: 1.3; letter-spacing: -0.02em; }
    .prose p { margin-bottom: 1.75rem; line-height: 1.85; font-size: 1.125rem; color: inherit; }
    .prose p:first-of-type::first-letter { font-family: 'Playfair Display', Georgia, serif; font-size: 4rem; float: left; line-height: 0.8; padding-right: 0.75rem; padding-top: 0.25rem; font-weight: 500; }

    .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .img-zoom { overflow: hidden; }
    .img-zoom img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .img-zoom:hover img { transform: scale(1.03); }

    .hover-underline { position: relative; }
    .hover-underline::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: currentColor; transition: width 0.3s ease; }
    .hover-underline:hover::after { width: 100%; }

    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<body class="bg-paper-50 text-ink dark:bg-[#0f0f0f] dark:text-[#e5e5e5] antialiased transition-colors duration-500">

  <div id="read-progress"></div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 border-b border-paper-200 dark:border-[#1f1f1f] bg-paper-50/80 dark:bg-[#0f0f0f]/80 backdrop-blur-md transition-colors duration-500">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-baseline gap-2 group">
        <span class="font-serif text-2xl font-semibold tracking-tight">BlogSphere</span>
        <span class="w-1.5 h-1.5 rounded-full bg-ink dark:bg-white opacity-40 group-hover:opacity-100 transition-opacity"></span>
      </a>
      <div class="flex items-center gap-4">
        <button onclick="toggleDark()" class="p-2 opacity-60 hover:opacity-100 transition-opacity" aria-label="Toggle theme">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M21.75 15a9.75 9.75 0 1 1-10.8-10.8 7.5 7.5 0 0 0 10.8 10.8Z"/></svg>
          <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 3v2.25m6.36.39-1.59 1.59M21 12h-2.25m-.39 6.36-1.59-1.59M12 18.75V21m-4.77-4.23-1.59 1.59M5.25 12H3m4.23-4.77L5.64 5.64M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
        </button>
        <a href="index.html" class="text-sm font-medium opacity-60 hover:opacity-100 transition-opacity flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
          Index
        </a>
      </div>
    </div>
  </nav>

  <!-- Article -->
  <article class="pt-28 px-6">
    <div class="max-w-3xl mx-auto">
      <div id="articleMeta" class="reveal pt-8 pb-12"></div>
    </div>
  </article>

  <!-- Hero Image -->
  <div class="max-w-5xl mx-auto px-6 mb-16">
    <div id="articleHero" class="img-zoom rounded-xl reveal reveal-delay-1"></div>
  </div>

  <!-- Content -->
  <div class="max-w-3xl mx-auto px-6 pb-20">
    <div id="articleContent" class="prose dark:prose-invert reveal reveal-delay-2"></div>

    <!-- Tags -->
    <div id="articleTags" class="mt-16 pt-8 border-t border-ink/10 dark:border-white/10 reveal reveal-delay-2"></div>

    <!-- Share -->
    <div class="mt-8 flex items-center gap-4 reveal reveal-delay-2">
      <span class="font-mono text-xs tracking-widest uppercase opacity-40">Share</span>
      <button onclick="shareTwitter()" class="p-2 rounded-full border border-ink/15 dark:border-white/15 hover:border-ink/40 dark:hover:border-white/40 transition-colors opacity-60 hover:opacity-100">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </button>
      <button onclick="shareLinkedIn()" class="p-2 rounded-full border border-ink/15 dark:border-white/15 hover:border-ink/40 dark:hover:border-white/40 transition-colors opacity-60 hover:opacity-100">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </button>
      <button onclick="copyLink()" class="p-2 rounded-full border border-ink/15 dark:border-white/15 hover:border-ink/40 dark:hover:border-white/40 transition-colors opacity-60 hover:opacity-100 relative">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"/></svg>
        <span id="copyTooltip" class="absolute -top-8 left-1/2 -translate-x-1/2 px-2 py-1 bg-ink dark:bg-white text-paper-50 dark:text-ink text-[10px] font-mono rounded opacity-0 transition-opacity whitespace-nowrap pointer-events-none">Copied!</span>
      </button>
    </div>
  </div>

  <!-- Related -->
  <section class="px-6 pb-24">
    <div class="max-w-6xl mx-auto">
      <div class="border-t border-ink/10 dark:border-white/10 pt-16">
        <h2 class="font-mono text-xs tracking-widest uppercase opacity-40 mb-10">More Reading</h2>
        <div id="relatedGrid" class="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-10"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="px-6 py-12 border-t border-ink/10 dark:border-white/10">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="flex items-baseline gap-2">
        <span class="font-serif text-xl font-semibold">BlogSphere</span>
        <span class="font-mono text-xs opacity-40">Est. 2026</span>
      </div>
      <p class="text-sm opacity-40">Crafted for the modern web.</p>
      <div class="flex gap-6">
        <a href="#" class="opacity-40 hover:opacity-100 transition-opacity"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
        <a href="#" class="opacity-40 hover:opacity-100 transition-opacity"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a>
      </div>
    </div>
  </footer>

  <!-- DATA -->
  <script>
    const blogs = [
      { id: 10, title: "UX Psychology: Designing for the Human Mind", category: "Design", date: "2026-05-25", readTime: 7,
        image: "https://images.unsplash.com/photo-1586717791821-3f44a5638d48?q=80&w=1200&auto=format&fit=crop",
        description: "How cognitive psychology principles can transform your design workflow and create interfaces that truly resonate with users.",
        content: `<p class="mb-6">Understanding how users think, perceive, and make decisions is the foundation of great design.</p><p class="mb-6">Cognitive biases, attention spans, and memory limitations all play a role in how people interact with interfaces.</p><h2 class="text-3xl font-bold mb-4">Key Principles</h2><p class="mb-6">Hick's Law, Fitts's Law, and the Gestalt principles are not just academic concepts &mdash; they are practical tools for every designer.</p>` },
      { id: 9, title: "The Future of Remote Work", category: "Technology", date: "2026-05-24", readTime: 6,
        image: "https://images.unsplash.com/photo-1593642632823-8f78536788c6?q=80&w=1200&auto=format&fit=crop",
        description: "How distributed teams and async collaboration are reshaping the workplace in ways we never anticipated.",
        content: `<p class="mb-6">Remote work has evolved from a temporary solution to a permanent structural shift in how companies operate.</p><p class="mb-6">Async communication, documentation-first culture, and digital whiteboarding tools are now essential.</p><h2 class="text-3xl font-bold mb-4">Building Remote Culture</h2><p class="mb-6">The most successful remote teams invest in over-communication, clear documentation, and intentional social connection.</p>` },
      { id: 8, title: "Understanding Large Language Models", category: "Technology", date: "2026-05-23", readTime: 9,
        image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format&fit=crop",
        description: "A developer-friendly deep dive into how LLMs work under the hood, from transformers to token prediction.",
        content: `<p class="mb-6">Large Language Models like GPT and LLaMA are built on the transformer architecture, a paradigm shift introduced in 2017.</p><p class="mb-6">Attention mechanisms allow the model to weigh the importance of different words in a sentence, enabling contextual understanding.</p><h2 class="text-3xl font-bold mb-4">Training &amp; Inference</h2><p class="mb-6">Pre-training on massive corpora followed by fine-tuning on specific tasks creates the versatile models we use today.</p>` },
      { id: 7, title: "The Complete Guide to React Server Components", category: "Development", date: "2026-05-22", readTime: 8,
        image: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?q=80&w=1200&auto=format&fit=crop",
        description: "Server Components are changing how we build React apps. Here's everything you need to know to get started.",
        content: `<p class="mb-6">React Server Components allow developers to render components exclusively on the server, reducing client-side JavaScript bundles.</p><p class="mb-6">This means faster initial page loads, improved SEO, and direct access to server-side resources like databases.</p><h2 class="text-3xl font-bold mb-4">When to Use Them</h2><p class="mb-6">Use Server Components for data fetching, accessing backend resources, and keeping large dependencies off the client bundle.</p>` },
      { id: 6, title: "Building Scalable Microservices", category: "Development", date: "2026-05-21", readTime: 8,
        image: "https://images.unsplash.com/photo-1558494949-ef526b0042a0?q=80&w=1200&auto=format&fit=crop",
        description: "Architectural patterns for modern distributed systems that scale gracefully under real-world load.",
        content: `<p class="mb-6">Microservices allow teams to build, deploy, and scale components independently.</p><p class="mb-6">Containerization with Docker and orchestration with Kubernetes have become the industry standard.</p><h2 class="text-3xl font-bold mb-4">Design Principles</h2><p class="mb-6">Focus on loose coupling, API-first design, and observability to ensure your services remain maintainable at scale.</p>` },
      { id: 5, title: "Cybersecurity Best Practices for 2026", category: "Security", date: "2026-05-20", readTime: 6,
        image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1200&auto=format&fit=crop",
        description: "Essential security strategies every developer should know to protect their applications and users.",
        content: `<p class="mb-6">As cyber threats evolve, so must our defense strategies.</p><p class="mb-6">Zero-trust architecture, multi-factor authentication, and continuous monitoring are now baseline requirements.</p><h2 class="text-3xl font-bold mb-4">Key Takeaways</h2><p class="mb-6">Implement secure coding practices, keep dependencies updated, and never underestimate the value of employee training.</p>` },
      { id: 4, title: "The Rise of Quantum Computing", category: "Technology", date: "2026-05-19", readTime: 7,
        image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?q=80&w=1200&auto=format&fit=crop",
        description: "How quantum computing is set to revolutionize problem solving across industries from medicine to cryptography.",
        content: `<p class="mb-6">Quantum computing leverages the principles of quantum mechanics to process information in fundamentally new ways.</p><p class="mb-6">Unlike classical computers that use bits, quantum computers use qubits which can exist in multiple states simultaneously.</p><h2 class="text-3xl font-bold mb-4">Real-World Applications</h2><p class="mb-6">From drug discovery to cryptography, quantum computing promises breakthroughs in fields previously thought impossible to scale.</p>` },
      { id: 1, title: "The Future of AI in Web Development", category: "Technology", date: "2026-05-16", readTime: 5,
        image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop",
        description: "Explore how artificial intelligence is transforming the way developers build modern web applications.",
        content: `<p class="mb-6">Artificial Intelligence is changing the way developers build modern applications.</p><p class="mb-6">AI tools can generate code, automate testing and improve user experiences.</p><h2 class="text-3xl font-bold mb-4">Why AI Matters</h2><p class="mb-6">Businesses are rapidly integrating AI into products to increase efficiency and innovation.</p>` },
      { id: 2, title: "Minimal UI Design Trends in 2026", category: "Design", date: "2026-05-15", readTime: 4,
        image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop",
        description: "Latest minimalist design principles that define modern interfaces with clarity and intention.",
        content: `<p class="mb-6">Minimalism continues to dominate modern UI design.</p><p class="mb-6">Designers focus on clean layouts, spacing and typography.</p>` },
      { id: 3, title: "Why JavaScript Still Dominates", category: "Development", date: "2026-05-12", readTime: 6,
        image: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=1200&auto=format&fit=crop",
        description: "Understanding why JavaScript remains the top language for both frontend and backend development.",
        content: `<p class="mb-6">JavaScript powers frontend and backend development.</p><p class="mb-6">Its ecosystem is massive and continues to evolve rapidly.</p>` },
    ];

    const catColor = { Technology: 'text-accent-tech', Design: 'text-accent-design', Development: 'text-accent-dev', Security: 'text-accent-sec' };
    const catDot = { Technology: 'bg-accent-tech', Design: 'bg-accent-design', Development: 'bg-accent-dev', Security: 'bg-accent-sec' };

    const params = new URLSearchParams(window.location.search);
    const blogId = Number(params.get("id"));
    const blog = blogs.find(item => item.id === blogId);

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    if (blog) {
      document.title = `${blog.title} — BlogSphere`;

      document.getElementById('articleMeta').innerHTML = `
        <div class="flex items-center gap-3 mb-6">
          <span class="w-2 h-2 rounded-full ${catDot[blog.category]}"></span>
          <span class="font-mono text-xs tracking-widest uppercase ${catColor[blog.category]}">${blog.category}</span>
          <span class="opacity-20">&middot;</span>
          <span class="font-mono text-xs opacity-40">${formatDate(blog.date)}</span>
          <span class="opacity-20">&middot;</span>
          <span class="font-mono text-xs opacity-40">${blog.readTime} min read</span>
        </div>
        <h1 class="font-serif text-4xl md:text-6xl font-medium leading-[1.1] tracking-tight">${blog.title}</h1>
        <p class="mt-6 text-xl opacity-50 leading-relaxed max-w-xl">${blog.description}</p>
      `;

      document.getElementById('articleHero').innerHTML = `
        <img src="${blog.image}" class="w-full h-[280px] md:h-[450px] object-cover rounded-xl" alt="${blog.title}">
      `;

      document.getElementById('articleContent').innerHTML = blog.content;

      document.getElementById('articleTags').innerHTML = `
        <div class="flex flex-wrap items-center gap-2">
          <span class="font-mono text-xs tracking-widest uppercase opacity-40 mr-2">Tags</span>
          <span class="px-3 py-1.5 rounded-full border border-ink/15 dark:border-white/15 text-xs font-medium">${blog.category}</span>
          <span class="px-3 py-1.5 rounded-full border border-ink/15 dark:border-white/15 text-xs font-medium">2026</span>
          <span class="px-3 py-1.5 rounded-full border border-ink/15 dark:border-white/15 text-xs font-medium">Article</span>
        </div>
      `;

      const related = blogs.filter(b => b.id !== blog.id).slice(0, 3);
      document.getElementById('relatedGrid').innerHTML = related.map((b, i) => `
        <a href="blog.html?id=${b.id}" class="group block reveal" style="transition-delay: ${i * 0.1}s">
          <div class="img-zoom rounded-lg mb-4">
            <img src="${b.image}" class="w-full h-44 object-cover rounded-lg" alt="${b.title}">
          </div>
          <div class="flex items-center gap-2 mb-2">
            <span class="w-1.5 h-1.5 rounded-full ${catDot[b.category]}"></span>
            <span class="font-mono text-[10px] tracking-widest uppercase ${catColor[b.category]}">${b.category}</span>
          </div>
          <h3 class="font-serif text-lg font-medium leading-snug group-hover:opacity-70 transition-opacity line-clamp-2">${b.title}</h3>
          <div class="flex items-center gap-2 font-mono text-[10px] opacity-40 tracking-wider mt-2">
            <span>${formatDate(blog.date)}</span>
            <span>&middot;</span>
            <span>${b.readTime} MIN</span>
          </div>
        </a>
      `).join('');
    } else {
      document.getElementById('articleMeta').innerHTML = `
        <div class="text-center py-24">
          <p class="font-serif text-4xl italic opacity-30 mb-4">Article not found</p>
          <p class="opacity-40 mb-8">The story you are looking for does not exist.</p>
          <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium opacity-60 hover:opacity-100 transition-opacity border-b border-current pb-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
            Back to all articles
          </a>
        </div>
      `;
      document.getElementById('articleHero').style.display = 'none';
      document.getElementById('articleContent').style.display = 'none';
      document.getElementById('articleTags').style.display = 'none';
      document.querySelector('.mt-8.flex').style.display = 'none';
      document.getElementById('relatedGrid').parentElement.parentElement.style.display = 'none';
    }

    // Scroll progress
    window.addEventListener('scroll', () => {
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      document.getElementById('read-progress').style.width = (scrollTop / scrollHeight * 100) + '%';
    });

    // Reveal on scroll
    setTimeout(() => {
      document.querySelectorAll('.reveal').forEach(el => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
          });
        }, { threshold: 0.1 });
        observer.observe(el);
      });
    }, 100);

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    function shareTwitter() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(blog ? blog.title : 'Check out this article');
      window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
    }

    function shareLinkedIn() {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const tooltip = document.getElementById('copyTooltip');
        tooltip.style.opacity = '1';
        setTimeout(() => tooltip.style.opacity = '0', 2000);
      });
    }

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
