<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Details</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <header class="bg-white shadow-sm sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <a
        href="index.html"
        class="text-3xl font-extrabold text-indigo-600"
      >
        BlogSphere
      </a>

      <a
        href="index.html"
        class="bg-indigo-600 text-white px-5 py-2 rounded-xl hover:bg-indigo-700"
      >
        Back
      </a>

    </div>

  </header>

  <!-- Blog Content -->
  <main class="max-w-4xl mx-auto px-6 py-16">

    <div
      id="blogDetails"
      class="bg-white rounded-3xl overflow-hidden shadow-lg"
    ></div>

  </main>

  <!-- BLOG DATA -->
  <script>

    const blogs = [

      {
        id: 1,
        title: "The Future of AI in Web Development",
        category: "Technology",
        date: "2026-05-16",

        image:
          "https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop",

        content:
          `
            <p class="mb-6">
              Artificial Intelligence is transforming the web industry.
            </p>

            <p class="mb-6">
              Developers now use AI for automation, testing and code generation.
            </p>

            <h2 class="text-3xl font-bold mb-4">
              Future Scope
            </h2>

            <p class="mb-6">
              AI-powered interfaces will become standard in future applications.
            </p>
          `
      },

      {
        id: 2,
        title: "Minimal UI Design Trends in 2026",
        category: "Design",
        date: "2026-05-15",

        image:
          "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop",

        content:
          `
            <p class="mb-6">
              Minimal design focuses on clarity and simplicity.
            </p>

            <p class="mb-6">
              Modern interfaces now prioritize spacing and typography.
            </p>
          `
      },

      {
        id: 3,
        title: "Why JavaScript Still Dominates",
        category: "Development",
        date: "2026-05-12",

        image:
          "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=1200&auto=format&fit=crop",

        content:
          `
            <p class="mb-6">
              JavaScript remains the backbone of modern web apps.
            </p>

            <p class="mb-6">
              Frameworks like React and Next.js keep it highly relevant.
            </p>
          `
      }

    ];

  </script>

  <!-- MAIN SCRIPT -->
  <script>

    const params = new URLSearchParams(window.location.search);

    const blogId = Number(params.get("id"));

    const blog = blogs.find(item => item.id === blogId);

    const blogDetails = document.getElementById("blogDetails");

    if(blog){

      blogDetails.innerHTML = `

        <img
          src="${blog.image}"
          class="w-full h-[400px] object-cover"
        >

        <div class="p-10">

          <div class="flex items-center gap-4 mb-6">

            <span class="bg-indigo-100 text-indigo-600 px-4 py-2 rounded-full text-sm">
              ${blog.category}
            </span>

            <span class="text-gray-500">
              ${blog.date}
            </span>

          </div>

          <h1 class="text-5xl font-extrabold mb-8 leading-tight">
            ${blog.title}
          </h1>

          <div class="text-lg text-gray-700 leading-9">
            ${blog.content}
          </div>

        </div>

      `;

    } else {

      blogDetails.innerHTML = `

        <div class="p-10 text-center">

          <h2 class="text-4xl font-bold mb-4">
            Blog Not Found
          </h2>

          <p class="text-gray-500">
            The requested blog does not exist.
          </p>

        </div>

      `;
    }

  </script>

</body>
</html>
